<rect x="980" y="200" width="130" height="105" class="box green"/><text x="1045" y="230" text-anchor="middle" class="h">Core</text><text x="995" y="265" class="t">DataNode</text><text x="995" y="290" class="t">NodeManager</text>
<rect x="1135" y="200" width="130" height="105" class="box gray"/><text x="1200" y="230" text-anchor="middle" class="h">Task</text><text x="1150" y="265" class="t">Compute-only</text><text x="1150" y="290" class="t">Elastic scale</text>

