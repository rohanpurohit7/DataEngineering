<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
<style>
.title{font:700 38px Arial;fill:#102a43}.sub{font:18px Arial;fill:#486581}
.h{font:700 20px Arial;fill:#102a43}.t{font:15px Arial;fill:#243b53}
.box{fill:#fff;stroke:#3b82f6;stroke-width:2;rx:16}.green{stroke:#16a34a}.orange{stroke:#ea580c}.purple{stroke:#7c3aed}.gray{stroke:#64748b}
.arrow{stroke:#334e68;stroke-width:3;fill:none;marker-end:url(#a)}
</style>
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334e68"/></marker></defs>
<rect width="1600" height="1000" fill="#f8fafc"/>
<text x="800" y="55" text-anchor="middle" class="title">AWS Data Engineering Techniques Platform</text>
<text x="800" y="88" text-anchor="middle" class="sub">Cloud-deployable labs for Hadoop, Spark, Hive, Pig, HBase and distributed K-Means</text>

<rect x="50" y="145" width="260" height="180" class="box gray"/>
<text x="180" y="180" text-anchor="middle" class="h">Data Producers</text>
<text x="80" y="220" class="t">• Web and mobile events</text><text x="80" y="250" class="t">• Transaction systems</text>
<text x="80" y="280" class="t">• Logs and flat files</text><text x="80" y="310" class="t">• Streaming/batch sources</text>

