<text x="545" y="180" text-anchor="middle" class="h">Amazon S3 Data Lake</text>
<text x="420" y="220" class="t">Raw → curated → analytics zones</text><text x="420" y="250" class="t">Jobs, bootstrap scripts and logs</text>
